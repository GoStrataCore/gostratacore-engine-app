version: "3"

services:

  gostratacore-engine:

    container_name: gostratacore-engine

    image: ghcr.io/gostratacore/gostratumengine:1.2.0

    restart: unless-stopped

    ports:
      - "3333:3333"
      - "8080:8080"

    volumes:
      - gostratacore-data:/pool

volumes:
  gostratacore-data:
